services:
  trendradar:
    image: ${TRENDRADAR_IMAGE:-local/trendradar:6.10.0}
    container_name: trendradar
    restart: unless-stopped
    ports:
      - "0.0.0.0:${WEBSERVER_PORT:-8080}:${WEBSERVER_PORT:-8080}"
    volumes:
      - ../config:/app/config:ro
      - ../output:/app/output
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      WEBSERVER_PORT: ${WEBSERVER_PORT:-8080}
      CRON_SCHEDULE: ${CRON_SCHEDULE:-*/30 * * * *}
      RUN_MODE: ${RUN_MODE:-cron}
      IMMEDIATE_RUN: ${IMMEDIATE_RUN:-true}

  trendradar-admin:
    image: ${TRENDRADAR_IMAGE:-local/trendradar:6.10.0}
    container_name: trendradar-admin
    restart: unless-stopped
    entrypoint: [python, /app/admin/admin_server.py]
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      TRENDRADAR_ADMIN_HOST: 0.0.0.0
      TRENDRADAR_ADMIN_PORT: 8081
      TRENDRADAR_ADMIN_TOKEN_FILE: /app/admin/.admin-token
      TRENDRADAR_BASE_DIR: /app
      TRENDRADAR_CONFIG_DIR: /app/config
      TRENDRADAR_OUTPUT_DIR: /app/output
      TRENDRADAR_DOCS_DIR: /app/docs
      TRENDRADAR_ADMIN_DIR: /app/admin
      TRENDRADAR_RUN_TIMEOUT: ${TRENDRADAR_RUN_TIMEOUT:-900}
    ports:
      - "0.0.0.0:${ADMIN_PORT:-8081}:8081"
    volumes:
      - ../admin:/app/admin:ro
      - ../docs:/app/docs:ro
      - ../config:/app/config
      - ../output:/app/output
